<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фиксированная вёрстка (Grid)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f0f0;
            padding: 20px;
        }
        .wrapper {
            width: 1280px;
            margin: 0 auto;
            background: white;
        }
        .header, .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .nav {
            background: #27ae60;
            text-align: center;
            padding: 15px;
        }
        .nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .grid {
            display: grid;
            grid-template-columns: 500px 1fr;
        }
        .grid-item {
            background: #ecf0f1;
            text-align: center;
            padding: 60px 0;
            border: 1px solid #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">Шапка (логотип)</div>
        <div class="nav">
            <a href="#">Главная</a>
            <a href="#">О нас</a>
            <a href="#">Услуги</a>
            <a href="#">Портфолио</a>
            <a href="#">Блог</a>
            <a href="#">Контакты</a>
        </div>
        <div class="grid">
            <div class="grid-item">1 (500px)</div>
            <div class="grid-item">4 (оставшаяся часть)</div>
            <div class="grid-item">2 (500px)</div>
            <div class="grid-item">5 (оставшаяся часть)</div>
            <div class="grid-item">3 (500px)</div>
            <div class="grid-item">6 (оставшаяся часть)</div>
        </div>
        <div class="footer">© 2026 Фиксированная вёрстка (Grid)</div>
    </div>
</body>
</html>
