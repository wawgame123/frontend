<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фиксированная вёрстка (Grid) | Тупик П.Н.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            color: #f1f5f9;
            padding: 40px 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .wrapper {
            width: 1280px;
            margin: 0 auto;
            background: #1e293b;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        .header {
            background: #0f172a;
            color: #38bdf8;
            text-align: center;
            padding: 30px;
            border-bottom: 2px solid #38bdf8;
        }
        .header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .student-name {
            font-size: 14px;
            color: #fbbf24;
            margin-top: 10px;
            opacity: 0.8;
        }

        .nav {
            background: #334155;
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid #475569;
        }
        .nav a {
            color: #f1f5f9;
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .nav a:hover {
            color: #38bdf8;
        }

        .grid {
            display: grid;
            grid-template-columns: 500px 780px;
            grid-template-rows: repeat(3, auto);
            grid-template-areas: none;
            column-gap: 0px;
            row-gap: 0px;
            gap: 0px;
            justify-items: stretch;
            align-items: stretch;
            place-items: stretch;
            background: #1e293b;
        }

        .grid-item {
            background: #0f172a;
            text-align: center;
            padding: 60px 0;
            border: 1px solid #1e293b;
            color: #38bdf8;
            font-weight: bold;
            transition: background 0.3s;
            grid-column: auto;
            grid-row: auto;
            justify-self: stretch;
            align-self: auto;
            place-self: auto;
        }

        .grid-item:nth-child(even) {
            background: #111827;
            color: #fbbf24;
        }

        .grid-item:hover {
            background: #1e293b;
        }

        .footer {
            background: #0f172a;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
            font-size: 13px;
            border-top: 1px solid #334155;
        }
        
        .footer-info {
            background: #334155;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
   
        <nav class="nav">
            <a href="#">ГЛАВНАЯ</a>
            <a href="#">О НАС</a>
            <a href="#">УСЛУГИ</a>
            <a href="#">ПОРТФОЛИО</a>
            <a href="#">КОНТАКТЫ</a>
        </nav>

        <div class="grid">
            <div class="grid-item">БЛОК 1 (500px)</div>
            <div class="grid-item">БЛОК 4 (780px)</div>
            <div class="grid-item">БЛОК 2 (500px)</div>
            <div class="grid-item">БЛОК 5 (780px)</div>
            <div class="grid-item">БЛОК 3 (500px)</div>
            <div class="grid-item">БЛОК 6 (780px)</div>
        </div>

        <footer class="footer">
            <p>© 2026 Фиксированная вёрстка на Grid Layout (1280px)</p>
        </footer>
        
        <div class="footer-info">
            Разработка: Тупик Павел Николаевич (ПЗТ-43). В CSS применены 15 свойств Grid.
        </div>
    </div>
</body>
</html>
