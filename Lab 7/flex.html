<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 20px;
        }
        .adaptive {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        .header {
            background: #0f172a;
            color: #38bdf8;
            text-align: center;
            padding: 25px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #38bdf8;
        }
        .header .student-info {
            font-size: 13px;
            color: #fbbf24;
            margin-top: 6px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* НАВИГАЦИЯ */
        .nav {
            background: #334155;
            text-align: center;
            padding: 12px;
            position: relative;
        }
        .nav a {
            color: #f1f5f9;
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .nav a:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        /* БУРГЕР МЕНЮ (скрыто на десктопе) */
        .burger-checkbox, .burger-icon {
            display: none;
        }

        /* FLEX КОНТЕЙНЕР (9 свойств) */
        .row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            flex-flow: row wrap;
            justify-content: flex-start;
            align-content: stretch;
            align-items: stretch;
            column-gap: 0;
            gap: 0; 
            padding: 0;
        }

        /* FLEX ЭЛЕМЕНТЫ (6 свойств) */
        .block {
            background: #0f172a;
            text-align: center;
            padding: 55px 0;
            border: 1px solid #334155;
            font-weight: 600;
            color: #38bdf8;
            transition: all 0.3s;
            flex-grow: 0;
            flex-shrink: 1;
            flex-basis: auto;
            flex: 0 1 auto;
            align-self: auto;
            order: 0;
            width: 50%;
        }

        .block:hover {
            border-color: #fbbf24;
            color: #fbbf24;
            z-index: 1;
            outline: 1px solid #fbbf24;
        }

        /* АДАПТИВНАЯ ЛОГИКА */

        /* Ноутбуки: 3 колонки */
        @media (max-width: 1200px) and (min-width: 769px) {
            .block {
                width: 33.333%;
            }
        }

        /* Телефоны: Бургер и 1 колонка */
        @media (max-width: 768px) {
            .header .student-info {
                display: none;
            }
            .header {
                padding: 15px;
            }

            /* Логика бургера без JS */
            .burger-icon {
                display: block;
                width: 30px;
                height: 20px;
                position: relative;
                cursor: pointer;
                margin: 0 auto;
            }
            .burger-icon span, .burger-icon span:before, .burger-icon span:after {
                content: '';
                display: block;
                width: 100%;
                height: 3px;
                background: #38bdf8;
                position: absolute;
                transition: 0.3s;
            }
            .burger-icon span:before { top: -8px; }
            .burger-icon span:after { bottom: -8px; }

            .nav-links {
                display: none;
                flex-direction: column;
                padding-top: 15px;
            }
            .nav-links a {
                margin: 5px 0;
            }

            /* Переключение по клику */
            .burger-checkbox:checked ~ .nav-links {
                display: flex;
            }
            .burger-checkbox:checked ~ .burger-icon span {
                background: transparent;
            }
            .burger-checkbox:checked ~ .burger-icon span:before {
                transform: rotate(45deg);
                top: 0;
            }
            .burger-checkbox:checked ~ .burger-icon span:after {
                transform: rotate(-45deg);
                bottom: 0;
            }

            .block {
                width: 100%;
            }
        }

        .footer {
            background: #0f172a;
            color: #94a3b8;
            text-align: center;
            padding: 20px;
            font-size: 13px;
            border-top: 1px solid #334155;
        }
        .group-info {
            background: #1e293b;
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>
        <div class="nav">
            <input type="checkbox" id="burger" class="burger-checkbox">
            <label for="burger" class="burger-icon">
                <span></span>
            </label>
            <div class="nav-links">
                <a href="#">Главная</a>
                <a href="#">О нас</a>
                <a href="#">Услуги</a>
                <a href="#">Портфолио</a>
                <a href="#">Блог</a>
                <a href="#">Контакты</a>
            </div>
        </div>
        
        <div class="row">
            <div class="block">Блок 1</div>
            <div class="block">Блок 2</div>
            <div class="block">Блок 3</div>
            <div class="block">Блок 4</div>
            <div class="block">Блок 5</div>
            <div class="block">Блок 6</div>
        </div>

        <div class="footer">
            <p>© 2026 Адаптивная вёрстка | Лабораторная работа №5</p>
        </div>
        <div class="group-info">
            Выполнил: Тупик Павел Николаевич (ПЗТ-43). Все 15 свойств Flexbox включены.
        </div>
    </div>
</body>
</html>
