<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивная вёрстка (Grid) | Тупик П.Н.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            padding: 20px;
        }
        .wrapper {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        /* ШАПКА */
        .header {
            background: #0f172a;
            color: #38bdf8;
            text-align: center;
            padding: 30px;
            border-bottom: 2px solid #38bdf8;
        }

        /* НАВИГАЦИЯ И БУРГЕР */
        .nav {
            background: #334155;
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid #475569;
            position: relative;
        }
        
        .burger-checkbox, .burger-icon {
            display: none;
        }

        .nav-links a {
            color: #f1f5f9;
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #38bdf8;
        }

        /* GRID-КОНТЕЙНЕР (1-10) */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto;
            grid-template-areas: none;
            column-gap: 15px;
            row-gap: 15px;
            gap: 15px;
            justify-items: stretch;
            align-items: stretch;
            place-items: stretch;
            padding: 20px;
            background: #1e293b;
        }

        /* GRID-ЭЛЕМЕНТЫ (11-15) */
        .grid-item {
            background: #0f172a;
            text-align: center;
            padding: 25px;
            border: 1px solid #334155;
            border-radius: 12px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s, border-color 0.3s;
            grid-column: auto;
            grid-row: auto;
            justify-self: stretch;
            align-self: auto;
            place-self: auto;
        }

        .grid-item:hover {
            border-color: #38bdf8;
            transform: translateY(-4px);
        }

        .grid-item img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .grid-item p {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.4;
        }
        .block-num {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
        }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 15px;
            }
            .header div {
                display: none;
            }

            .burger-icon {
                display: block;
                width: 30px;
                height: 20px;
                position: relative;
                cursor: pointer;
                margin: 0 auto;
            }
            .burger-icon span, .burger-icon span:before, .burger-icon span:after {
                content: '';
                display: block;
                width: 100%;
                height: 3px;
                background: #38bdf8;
                position: absolute;
                transition: 0.3s;
            }
            .burger-icon span:before { top: -8px; }
            .burger-icon span:after { bottom: -8px; }

            .nav-links {
                display: none;
                flex-direction: column;
                padding-top: 15px;
            }
            .nav-links a {
                display: block;
                margin: 10px 0;
            }

            .burger-checkbox:checked ~ .nav-links {
                display: flex;
            }
            .burger-checkbox:checked ~ .burger-icon span {
                background: transparent;
            }
            .burger-checkbox:checked ~ .burger-icon span:before {
                transform: rotate(45deg);
                top: 0;
            }
            .burger-checkbox:checked ~ .burger-icon span:after {
                transform: rotate(-45deg);
                bottom: 0;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            background: #0f172a;
            color: #64748b;
            text-align: center;
            padding: 25px;
            font-size: 13px;
            border-top: 1px solid #334155;
        }
        .group-tag {
            background: #1e293b;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
        <div class="nav">
            <input type="checkbox" id="burger" class="burger-checkbox">
            <label for="burger" class="burger-icon">
                <span></span>
            </label>
            <div class="nav-links">
                <a href="#">ГЛАВНАЯ</a>
                <a href="#">О НАС</a>
                <a href="#">УСЛУГИ</a>
                <a href="#">ПОРТФОЛИО</a>
                <a href="#">КОНТАКТЫ</a>
            </div>
        </div>

        <div class="grid">
            <div class="grid-item">
                <img src="/images/vibecat1.jpg" alt="cat">
                <p>Изображение кота</p>
            </div>
            
            <div class="grid-item">
                <span class="block-num">4</span>
            </div>
            
            <div class="grid-item">
                <p>Пример текста в сетке Grid. Макет перестраивается автоматически.</p>
            </div>
            
            <div class="grid-item">
                <span class="block-num">2</span>
            </div>
            
            <div class="grid-item">
                <span class="block-num">3</span>
            </div>
            
            <div class="grid-item">
                <span class="block-num">6</span>
            </div>
        </div>

        <div class="footer">
            © 2026 Адаптивная вёрстка (Grid) | Лабораторная работа №5
        </div>
       
    </div>
</body>
</html>
